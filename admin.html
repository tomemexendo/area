<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Admin - Tô Me Mexendo</title>
</head>

<body style="font-family: Arial; background:#111; color:white;">

<!-- LOGIN -->
<div id="loginBox" style="padding:40px; max-width:400px; margin:auto;">
  <h2>Login Admin</h2>

  <form id="adminForm">
    <input
      id="adminPassword"
      type="password"
      placeholder="Senha admin"
      style="padding:10px; width:100%; margin:10px 0;"
    />

    <button type="submit" style="padding:10px; width:100%;">
      Entrar
    </button>
  </form>
</div>

<!-- PAINEL -->
<div id="adminPanel" style="display:none; padding:40px;">
  <h1>Painel Admin</h1>

  <button onclick="logout()">Sair</button>

  <div id="contentArea" style="margin-top:20px;"></div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabase = createClient(
  "https://pxpojetrshxvtaznkxkj.supabase.co",
  "SUA_ANON_KEY"
)

const form = document.getElementById("adminForm")
const loginBox = document.getElementById("loginBox")
const panel = document.getElementById("adminPanel")
const area = document.getElementById("contentArea")

// 🔐 ENTRAR NO ADMIN
function enterAdmin() {
  loginBox.style.display = "none"
  panel.style.display = "block"
  loadContent()
}

// LOGIN
form.addEventListener("submit", async (e) => {
  e.preventDefault()

  const pass = document.getElementById("adminPassword").value

  if (pass !== "admin123") {
    alert("Senha incorreta")
    return
  }

  sessionStorage.setItem("admin", "true")
  enterAdmin()
})

// 🔄 CARREGAR CONTEÚDOS DO SUPABASE
async function loadContent() {
  const { data, error } = await supabase
    .from("content")
    .select("*")

  if (error) {
    console.error(error)
    return
  }

  area.innerHTML = ""

  data.forEach(item => {
    area.innerHTML += `
      <div style="margin-bottom:20px;">
        <strong>${item.type}</strong><br/>

        <input
          id="input-${item.type}"
          value="${item.link}"
          style="width:300px; padding:5px;"
        />

        <button onclick="saveItem('${item.type}')">
          Salvar
        </button>
      </div>
    `
  })
}

// 💾 SALVAR LINK
window.saveItem = async (type) => {
  const input = document.getElementById("input-" + type)

  const { error } = await supabase
    .from("content")
    .update({ link: input.value })
    .eq("type", type)

  if (!error) {
    alert("Atualizado!")
  } else {
    alert("Erro ao salvar")
  }
}

// 🚪 LOGOUT
window.logout = () => {
  sessionStorage.removeItem("admin")
  location.reload()
}

// 🔁 AUTO LOGIN
if (sessionStorage.getItem("admin") === "true") {
  enterAdmin()
}

</script>

</body>
</html>
