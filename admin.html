<body style="font-family: Arial; background:#111; color:white;">

<!-- LOGIN -->
<div id="loginBox" style="padding:40px; max-width:400px; margin:auto;">
  <h2>Login Admin</h2>

  <form id="adminForm">
    <input
      id="adminPassword"
      type="password"
      placeholder="Senha admin"
      style="padding:10px; width:100%; margin:10px 0;"
    />

    <button
      type="submit"
      style="padding:10px; width:100%; cursor:pointer;"
    >
      Entrar
    </button>
  </form>
</div>

<!-- PAINEL -->
<div id="adminPanel" style="display:none; padding:40px;">
  <h1>Painel Admin</h1>

  <button onclick="logout()">Sair</button>

  <div id="contentArea" style="margin-top:20px;"></div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabase = createClient(
  "https://pxpojetrshxvtaznkxkj.supabase.co",
  "SUA_ANON_KEY"
)

const form = document.getElementById("adminForm")
const loginBox = document.getElementById("loginBox")
const panel = document.getElementById("adminPanel")
const area = document.getElementById("contentArea")

form.addEventListener("submit", async (e) => {
  e.preventDefault()

  const pass = document.getElementById("adminPassword").value

  if (pass !== "admin123") {
    alert("Senha incorreta")
    return
  }

  sessionStorage.setItem("admin", "true")

  loginBox.style.display = "none"
  panel.style.display = "block"

  loadContent()
})

async function loadContent() {
  const { data } = await supabase.from("content").select("*")

  area.innerHTML = ""

  data.forEach(item => {
    area.innerHTML += `
      <div style="margin-bottom:20px;">
        <strong>${item.type}</strong><br/>

        <input id="input-${item.type}" value="${item.link}"
          style="width:300px; padding:5px;" />

        <button onclick="save('${item.type}')">Salvar</button>
      </div>
    `
  })
}

window.save = async (type) => {
  const input = document.getElementById("input-" + type)

  await supabase
    .from("content")
    .update({ link: input.value })
    .eq("type", type)

  alert("Atualizado!")
}

window.logout = () => {
  sessionStorage.removeItem("admin")
  location.reload()
}

if (sessionStorage.getItem("admin") === "true") {
  loginBox.style.display = "none"
  panel.style.display = "block"
  loadContent()
}
</script>

</body>
