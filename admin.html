<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabase = createClient(
  "https://pxpojetrshxvtaznkxkj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cG9qZXRyc2h4dnRhem5reGtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODgxMDYsImV4cCI6MjA5MzE2NDEwNn0.ClFcL_dtAvdBQdrqZUlDi2CnhGEH_wbATrmxjJhpYYs" 
)

window.addEventListener("DOMContentLoaded", () => {

  const form = document.getElementById("adminForm")
  const loginBox = document.getElementById("loginBox")
  const panel = document.getElementById("adminPanel")
  const area = document.getElementById("contentArea")

  function enterAdmin() {
    loginBox.style.display = "none"
    panel.style.display = "block"
    loadContent()
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault()

    const pass = document.getElementById("adminPassword").value

    if (pass !== "admin123") {
      alert("Senha incorreta")
      return
    }

    sessionStorage.setItem("admin", "true")
    enterAdmin()
  })

  async function loadContent() {
    const { data, error } = await supabase
      .from("content")
      .select("*")

    if (error || !data) {
      console.error(error)
      return
    }

    area.innerHTML = ""

    data.forEach(item => {
      area.innerHTML += `
        <div style="margin-bottom:20px;">
          <strong>${item.type}</strong><br/>

          <input
            id="input-${item.type}"
            value="${item.link || ''}"
            style="width:300px; padding:5px;"
          />

          <button onclick="saveItem('${item.type}')">
            Salvar
          </button>
        </div>
      `
    })
  }

  window.saveItem = async (type) => {
    const input = document.getElementById("input-" + type)

    const { error } = await supabase
      .from("content")
      .update({ link: input.value })
      .eq("type", type)

    if (!error) alert("Atualizado!")
    else alert("Erro ao salvar")
  }

  window.logout = () => {
    sessionStorage.removeItem("admin")
    location.reload()
  }

  if (sessionStorage.getItem("admin") === "true") {
    enterAdmin()
  }

})
</script>
