<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Admin - Tô Me Mexendo</title>
</head>

<body style="font-family: Arial; background:#0b1623; color:white;">

<!-- LOGIN -->
<div id="loginBox" style="padding:40px; max-width:400px; margin:auto;">
  <h2>Login Admin</h2>

  <form id="adminForm">
    <input
      id="adminPassword"
      type="password"
      placeholder="Senha admin"
      style="padding:10px; width:100%; margin:10px 0;"
    />

    <button type="submit" style="padding:10px; width:100%;">
      Entrar
    </button>
  </form>
</div>

<!-- PAINEL -->
<div id="adminPanel" style="display:none; padding:40px;">
  <h1>Painel Admin</h1>

  <button onclick="logout()" style="margin-bottom:20px;">
    Sair
  </button>

  <div style="margin-bottom:20px;">
  <button onclick="showContent()">Conteúdos</button>
  <button onclick="showUsers()">Alunos</button>
</div>

  <div id="contentArea"></div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabase = createClient(
  "https://pxpojetrshxvtaznkxkj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cG9qZXRyc2h4dnRhem5reGtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODgxMDYsImV4cCI6MjA5MzE2NDEwNn0.ClFcL_dtAvdBQdrqZUlDi2CnhGEH_wbATrmxjJhpYYs"
)

window.addEventListener("DOMContentLoaded", () => {

  const form = document.getElementById("adminForm")
  const loginBox = document.getElementById("loginBox")
  const panel = document.getElementById("adminPanel")
  const area = document.getElementById("contentArea")

  function enterAdmin() {
    loginBox.style.display = "none"
    panel.style.display = "block"
    loadContent()
  }
  window.showContent = () => {
  loadContent()
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault()

    const pass = document.getElementById("adminPassword").value

    if (pass !== "admin123") {
      alert("Senha incorreta")
      return
    }

    sessionStorage.setItem("admin", "true")
    enterAdmin()
  })

  async function loadContent() {
    const { data, error } = await supabase
      .from("content")
      .select("*")

    console.log("DATA:", data)
    console.log("ERROR:", error)

    if (error) {
      alert("Erro ao carregar dados")
      return
    }

    if (!data || data.length === 0) {
      area.innerHTML = "<p>Nenhum conteúdo encontrado</p>"
      return
    }

    area.innerHTML = ""

    data.forEach(item => {
      area.innerHTML += `
        <div style="margin-bottom:20px;">
          <strong>${item.type}</strong><br/>

          <input
            id="input-${item.type}"
            value="${item.link || ''}"
            style="width:300px; padding:5px;"
          />

          <button onclick="saveItem('${item.type}')">
            Salvar
          </button>
        </div>
      `
    })
  }

    window.showUsers = async () => {
  const { data, error } = await supabase
    .from("users")
    .select("*")

  if (error) {
    alert("Erro ao carregar usuários")
    return
  }

  area.innerHTML = `
    <h2>Adicionar novo</h2>
    <input id="newName" placeholder="Nome" />
    <input id="newPhone" placeholder="Senha" />
    <button onclick="addUser()">Adicionar</button>
   
    <h2>Alunos</h2>
    <input id="searchUser" placeholder="Buscar nome..." style="padding:5px; margin-bottom:10px;" />
  
  <div id="userList"></div>
  `


  renderUsers(data)

  document.getElementById("searchUser").oninput = (e) => {
    const term = e.target.value.toLowerCase()
    const filtered = data.filter(u =>
      u.name.toLowerCase().includes(term) ||
u.phone.includes(term)
    )
    renderUsers(filtered)
  }
}

  function renderUsers(users) {
  const list = document.getElementById("userList")

  list.innerHTML = ""

  users.forEach(user => {
    list.innerHTML += `
      <div style="margin-bottom:10px;">
        ${user.name} (${user.phone})

        <button onclick="deleteUser('${user.id}')">
          ❌
        </button>
      </div>
    `
  })
}

  window.addUser = async () => {
  const name = document.getElementById("newName").value
  const phone = document.getElementById("newPhone").value

  if (!name || !phone) {
    alert("Preencha tudo")
    return
  }

  const { error } = await supabase
    .from("users")
    .insert([{ name, phone }])

  if (!error) {
    alert("Adicionado!")
    showUsers()
  } else {
    alert("Erro ao adicionar")
  }
}

  window.deleteUser = async (id) => {
  const confirmDelete = confirm("Remover esse aluno?")

  if (!confirmDelete) return

  const { error } = await supabase
    .from("users")
    .delete()
    .eq("id", id)

  if (!error) {
    alert("Removido!")
    showUsers()
  } else {
    alert("Erro ao remover")
  }
}

  window.saveItem = async (type) => {
    const input = document.getElementById("input-" + type)

    const { error } = await supabase
      .from("content")
      .update({ link: input.value })
      .eq("type", type)

    if (!error) {
      alert("Atualizado!")
    } else {
      alert("Erro ao salvar")
    }
  }

  window.logout = () => {
    sessionStorage.removeItem("admin")
    location.reload()
  }

  // auto login
  if (sessionStorage.getItem("admin") === "true") {
    enterAdmin()
  }

})
</script>

</body>
</html>
