<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabase = createClient(
  "https://pxpojetrshxvtaznkxkj.supabase.co",
  "SUA_ANON_KEY"
)

let loaded = false

function safeGet(id) {
  const el = document.getElementById(id)
  if (!el) console.error("Elemento não encontrado:", id)
  return el
}

function init() {
  const form = safeGet("adminForm")
  const loginBox = safeGet("loginBox")
  const panel = safeGet("adminPanel")

  if (!form || !loginBox || !panel) {
    console.error("HTML incompleto")
    return
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault()

    const pass = safeGet("adminPassword")?.value

    if (pass !== "admin123") {
      alert("Senha incorreta")
      return
    }

    sessionStorage.setItem("admin", "true")

    loginBox.style.display = "none"
    panel.style.display = "block"

    await loadContent()
  })

  if (sessionStorage.getItem("admin") === "true") {
    loginBox.style.display = "none"
    panel.style.display = "block"
    loadContent()
  }
}

async function loadContent() {
  try {
    if (loaded) return
    loaded = true

    const { data, error } = await supabase
      .from("content")
      .select("*")

    if (error) {
      console.error("Supabase error:", error)
      return
    }

    const panel = safeGet("adminPanel")

    let html = "<h2>Editar conteúdos</h2>"

    data.forEach(item => {
      html += `
        <div style="margin-bottom:20px;">
          <strong>${item.type}</strong><br/>

          <input
            id="input-${item.type}"
            value="${item.link}"
            style="width:300px; padding:5px;"
          />

          <button onclick="saveItem('${item.type}')">
            Salvar
          </button>
        </div>
      `
    })

    panel.innerHTML += html

  } catch (err) {
    console.error("Erro geral:", err)
  }
}

window.saveItem = async (type) => {
  const input = document.getElementById("input-" + type)

  if (!input) return alert("Input não encontrado")

  const { error } = await supabase
    .from("content")
    .update({ link: input.value })
    .eq("type", type)

  if (!error) {
    alert("Atualizado!")
  } else {
    console.error(error)
    alert("Erro ao salvar")
  }
}

window.logout = () => {
  sessionStorage.removeItem("admin")
  location.reload()
}

window.addEventListener("DOMContentLoaded", init)
</script>
